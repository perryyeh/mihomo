secret: 'admin' # CHANGE-ME: api访问密码
log-level: info
bind-address: "*"
allow-lan: true
ipv6: true
profile:
  store-selected: true
  store-fake-ip: true
external-controller: :9090
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
geodata-loader: standard
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"
mode: rule
unified-delay: true
tcp-concurrent: true
client-fingerprint: random
routing-mark: 777
port: 7890 # HTTP(S) 代理服务器端口
socks-port: 7891 # SOCKS5 代理端口
redir-port: 7892 # 透明代理端口，用于 Linux 和 MacOS
tproxy-port: 7893 # Transparent proxy server port for Linux (TProxy TCP and TProxy UDP)
mixed-port: 7894 # HTTP(S) 和 SOCKS 代理混合端口
tun:
  enable: true
  stack: gVisor
  udp-timeout: 300
  auto-route: true
  auto-redirect: true
  auto-detect-interface: true
dns:
  enable: true
  ipv6: true
  listen: :53
  default-nameserver:
    - tls://223.5.5.5:853
    - tls://1.12.12.12:853
    - 10.0.0.1 # CHANGE-ME: local gateway DNS
  enhanced-mode: fake-ip # 方便静态路由
  fake-ip-range: 198.18.0.1/15 # fake-ip 池
  fake-ip-filter:
    - '*.lan'
  fake-ip-filter-mode: blacklist
  respect-rules: false
  nameserver:
    - tls://223.5.5.5:853
    - tls://1.12.12.12:853
    - 10.0.0.1 # CHANGE-ME: local gateway DNS
  fallback:
    - 1.1.1.1
    - 8.8.8.8
  fallback-filter:
    geoip: true
    geoip-code: CN
proxies:
  - name: upstream-anytls
    type: anytls
    server: example.com
    port: 14443
    password: CHANGE-ME
    udp: true

  - name: upstream-ss
    type: ss
    server: example.com
    port: 14445
    cipher: chacha20-ietf-poly1305
    password: CHANGE-ME
    udp: true
proxy-groups:
  - name: 🐟 漏网之鱼
    type: url-test
    interval: 60
    # Outbound/branch probe: default to gstatic. If the upstream is domestic
    # or centrally hosted in China, switch to http://connect.rom.miui.com/generate_204.
    url: http://www.gstatic.com/generate_204
    proxies:
      - upstream-anytls
      - upstream-ss

  - name: GLOBAL
    type: select
    proxies:
      - 🐟 漏网之鱼
      - DIRECT
rules:
  # Block QUIC / HTTP3 without blocking normal TCP/443 HTTPS.
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT

  # LAN / private / reserved
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,100.64.0.0/10,DIRECT
  - IP-CIDR,169.254.0.0/16,DIRECT
  - IP-CIDR,224.0.0.0/4,DIRECT
  - IP-CIDR6,fc00::/7,DIRECT
  - IP-CIDR6,fe80::/10,DIRECT

  # CN
  - GEOIP,CN,DIRECT

  # Others
  - MATCH,GLOBAL
