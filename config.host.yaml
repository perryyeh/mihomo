secret: 'admin' # CHANGE-ME: api访问密码
log-level: debug
bind-address: "*"
allow-lan: true
ipv6: true
profile:
  store-selected: true
  store-fake-ip: true
external-controller: :9090
external-ui: ui
external-ui-url: "https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip"
geodata-loader: standard
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat"
  mmdb: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/country.mmdb"
mode: rule
unified-delay: true
tcp-concurrent: true
client-fingerprint: random
routing-mark: 777
port: 7890 # HTTP(S) 代理服务器端口
socks-port: 7891 # SOCKS5 代理端口
redir-port: 7892 # 透明代理端口，用于 Linux 和 MacOS
tproxy-port: 7893 # Transparent proxy server port for Linux (TProxy TCP and TProxy UDP)
mixed-port: 7894 # HTTP(S) 和 SOCKS 代理混合端口
listeners:
  - name: anytls-in
    type: anytls
    port: 14443
    listen: 0.0.0.0
    password: CHANGE-ME

  - name: ss-in
    type: shadowsocks
    port: 14445
    listen: 0.0.0.0
    cipher: chacha20-ietf-poly1305
    password: CHANGE-ME
    udp: true
tun:
  enable: false
dns:
  enable: false
proxies:
  - name: surge
    type: socks5
    server: 10.0.0.120
    port: 6153
    udp: true

  - name: vless
    type: vless
    server: example.com
    port: 443
    uuid: CHANGE-ME
    network: tcp
    tls: true
    udp: true
proxy-groups:
  - name: 🐟
    type: fallback
    interval: 60
    # Inbound/central fallback probe: prefer a domestic URL.
    url: http://connect.rom.miui.com/generate_204
    proxies:
      - surge
      - vless

  - name: GLOBAL
    type: select
    proxies:
      - 🐟
      - DIRECT
rules:
  # LAN / private / reserved
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,100.64.0.0/10,DIRECT
  - IP-CIDR,169.254.0.0/16,DIRECT
  - IP-CIDR6,fc00::/7,DIRECT
  - IP-CIDR6,fe80::/10,DIRECT

  # Branch fake-ip must not be DIRECT.
  - IP-CIDR,198.18.0.0/15,GLOBAL,no-resolve

  # CN real IP can still be direct.
  - GEOIP,CN,DIRECT

  # Everything else goes through upstream fallback.
  - MATCH,GLOBAL
