services:
  mihomo:
    image: metacubex/mihomo:latest
    container_name: mihomo
    hostname: mihomo
    network_mode: host
    restart: always
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      TZ: Asia/Singapore
    volumes:
      - ./:/root/.config/mihomo
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
