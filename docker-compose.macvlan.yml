services:
  mihomo:
    image: metacubex/mihomo:latest
    container_name: mihomo
    hostname: mihomo
    restart: always
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      macvlan:
        ipv4_address: ${ipv4}
        ipv6_address: ${ipv6}
        mac_address: ${macaddress}
    sysctls:
      - net.ipv6.conf.all.forwarding=1
      - net.ipv4.conf.all.forwarding=1
    environment:
      TZ: Asia/Singapore
    volumes:
      - ./:/root/.config/mihomo
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro

networks:
  macvlan:
    external: true
    name: ${MACVLAN_NET}
